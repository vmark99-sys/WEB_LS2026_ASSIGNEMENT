<h2>Contact us about German Shepherd training</h2>

<form id="trainingForm" action="#" method="post">
    <label for="fname">First name:</label><br>
    <input type="text" id="fname" name="fname" placeholder="Your first name"><br>

    <label for="lname">Last name:</label><br>
    <input type="text" id="lname" name="lname" placeholder="Your last name"><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" placeholder="Your email ex: email@domain.com"><br>

    <label for="dogname">Dog's name:</label><br>
    <input type="text" id="dogname" name="dogname" placeholder="Beky"><br>

    <p>What training level does your dog need?</p>

    <input type="radio" id="puppy" name="training_level" value="Puppy">
    <label for="puppy">Beginner training</label><br>

    <input type="radio" id="obedience" name="training_level" value="Obedience">
    <label for="obedience">Basic obedience</label><br>

    <input type="radio" id="protection" name="training_level" value="Protection">
    <label for="protection">Protection training</label><br><br>

    <p>What are you interested in?</p>

    <input type="checkbox" id="basic" name="interest_basic" value="Basic obedience">
    <label for="basic">Basic obedience</label><br>

    <input type="checkbox" id="tracking" name="interest_tracking" value="Tracking">
    <label for="tracking">Tracking</label><br>

    <input type="checkbox" id="protectionwork" name="interest_protection" value="Protection work">
    <label for="protectionwork">Protection work</label><br>

    <input type="checkbox" id="puppytraining" name="interest_puppy" value="Puppy training">
    <label for="puppytraining">Puppy training</label><br><br>

    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="5" cols="30" placeholder="Tell us about your German Shepherd, age, experience and training goals..."></textarea><br><br>


    <p id="formMessage"></p>
    <input type="submit" value="Send message">
</form>

<p>If you send this form, we will contact you about German Shepherd training options.</p>



</body>
</html>
